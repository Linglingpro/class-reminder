name: 课程提醒

on:
  schedule:
    # 北京时间 8:00 - 20:30 每 30 分钟运行一次
    - cron: '*/30 0-12 * * *'
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install requests

      - name: 检查课程并发送提醒
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
        run: python remind.py
